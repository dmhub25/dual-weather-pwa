<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dual-Unit Weather PWA</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon-192.png" type="image/png" />
  <meta name="theme-color" content="#1976d2" />
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      text-align: center;
      background: #e0f7fa;
      color: #333;
    }
    header {
      background: #1976d2;
      color: white;
      padding: 1rem;
    }
    h1 {
      margin: 0;
      font-size: 1.5rem;
    }
    main {
      padding: 1rem;
    }
    #location {
      margin-bottom: 0.5rem;
      font-weight: bold;
    }
    #temperature {
      font-size: 2rem;
      margin: 1rem 0;
    }
    #forecast,
    #hourly-forecast {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin-top: 1rem;
    }
    .forecast-card {
      background: #fff;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
      width: 100px;
    }
    .forecast-card p {
      margin: 0.2rem 0;
      font-size: 0.9rem;
    }
    input,
    button {
      padding: 0.5rem;
      margin: 0.3rem;
      font-size: 1rem;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    button {
      background: #1976d2;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background: #1565c0;
    }
  </style>
</head>
<body>
  <header>
    <h1>Dual-Unit Weather PWA</h1>
  </header>

  <main>
    <div><span id="location">Detecting location…</span></div>

    <div id="temperature">-- °C / -- °F</div>

    <div>
      <input type="text" id="manual-location" placeholder="Enter city or coordinates" />
      <button id="search-btn">Search</button>
    </div>

    <h2>Hourly Forecast</h2>
    <div id="hourly-forecast" class="forecast"></div>

    <h2>Daily Forecast</h2>
    <div id="forecast"></div>
  </main>

  <script>
    const API_KEY = "5bf831e392c2f9ea1ad8a0cbc311745d"; // <-- Replace this

    const locationEl = document.getElementById("location");
    const temperatureEl = document.getElementById("temperature");
    const forecastEl = document.getElementById("forecast");
    const hourlyEl = document.getElementById("hourly-forecast");
    const searchBtn = document.getElementById("search-btn");
    const manualInput = document.getElementById("manual-location");

    async function loadWeather(lat, lon, name) {
      locationEl.textContent = name;

      try {
        // Current weather
        const currentRes = await fetch(
          `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`
        );
        if (!currentRes.ok) {
          const err = await currentRes.json();
          throw new Error(err.message || "Failed to fetch current weather");
        }
        const current = await currentRes.json();

        const c = Math.round(current.main.temp);
        const f = Math.round(c * 9 / 5 + 32);
        temperatureEl.textContent = `${c} °C / ${f} °F`;

        // 5-day / 3-hour forecast
        const forecastRes = await fetch(
          `https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`
        );
        if (!forecastRes.ok) {
          const err = await forecastRes.json();
          throw new Error(err.message || "Failed to fetch forecast");
        }
        const forecast = await forecastRes.json();

        // Hourly forecast - next 12 periods (3h each)
        hourlyEl.innerHTML = "";
        forecast.list.slice(0, 12).forEach((item) => {
          const c = Math.round(item.main.temp);
          const f = Math.round(c * 9 / 5 + 32);
          const card = document.createElement("div");
          card.className = "forecast-card";
          card.innerHTML = `
            <p>${new Date(item.dt * 1000).getHours()}:00</p>
            <p>${c}°C / ${f}°F</p>
          `;
          hourlyEl.appendChild(card);
        });

        // Aggregate daily forecast min/max
        const dailyMap = {};
        forecast.list.forEach((item) => {
          const day = new Date(item.dt * 1000).toLocaleDateString();
          if (!dailyMap[day]) {
            dailyMap[day] = { min: item.main.temp, max: item.main.temp };
          } else {
            dailyMap[day].min = Math.min(dailyMap[day].min, item.main.temp);
            dailyMap[day].max = Math.max(dailyMap[day].max, item.main.temp);
          }
        });

        forecastEl.innerHTML = "";
        Object.keys(dailyMap)
          .slice(0, 7)
          .forEach((day) => {
            const minC = Math.round(dailyMap[day].min);
            const maxC = Math.round(dailyMap[day].max);
            const minF = Math.round(minC * 9 / 5 + 32);
            const maxF = Math.round(maxC * 9 / 5 + 32);
            const card = document.createElement("div");
            card.className = "forecast-card";
            card.innerHTML = `
              <p>${new Date(day).toLocaleDateString(undefined, { weekday: "short" })}</p>
              <p>${minC}°C / ${minF}°F - ${maxC}°C / ${maxF}°F</p>
            `;
            forecastEl.appendChild(card);
          });
      } catch (err) {
        console.error(err);
        locationEl.textContent = "Failed to load weather";
      }
    }

    async function detectLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (pos) => loadWeather(pos.coords.latitude, pos.coords.longitude, "Your location"),
          async (err) => {
            console.warn("Geolocation failed, using IP fallback:", err.message);
            await ipFallback();
          },
          { timeout: 5000 }
        );
      } else {
        await ipFallback();
      }
    }

    async function ipFallback() {
      try {
        const r = await fetch("https://ipapi.co/json/");
        const d = await r.json();
        if (d.latitude && d.longitude) {
          loadWeather(d.latitude, d.longitude, d.city);
        } else {
          locationEl.textContent = "Could not detect location";
        }
      } catch (err) {
        console.error("IP fallback failed", err);
        locationEl.textContent = "Could not detect location";
      }
    }

    searchBtn.addEventListener("click", async () => {
      const query = manualInput.value.trim();
      if (!query) return;
      try {
        // Geocode city name to lat/lon
        const geoRes = await fetch(
          `https://api.openweathermap.org/geo/1.0/direct?q=${encodeURIComponent(query)}&limit=1&appid=${API_KEY}`
        );
        if (!geoRes.ok) {
          const err = await geoRes.json();
          throw new Error(err.message || "Failed to fetch location");
        }
        const geoData = await geoRes.json();
        if (geoData.length === 0) {
          locationEl.textContent = "Location not found";
          return;
        }
        const loc = geoData[0];
        loadWeather(loc.lat, loc.lon, loc.name);
      } catch (err) {
        console.error(err);
        locationEl.textContent = "Failed to fetch location";
      }
    });

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker
        .register("sw.js")
        .then(() => console.log("Service Worker registered"))
        .catch((err) => console.error("Service Worker registration failed:", err));
    }

    detectLocation();
  </script>
</body>
</html>
