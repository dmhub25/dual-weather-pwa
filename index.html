<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dual-Unit Weather PWA</title>
  
  <!-- Manifest -->
  <link rel="manifest" href="manifest.json">
  
  <!-- Favicon -->
  <link rel="icon" href="icon-192.png" type="image/png">

  <!-- Theme color for mobile -->
  <meta name="theme-color" content="#1976d2">

  <!-- Styles -->
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; text-align: center; background: #e0f7fa; color: #333; }
    header { background: #1976d2; color: white; padding: 1rem; }
    h1 { margin: 0; font-size: 1.5rem; }
    main { padding: 1rem; }
    #location { margin-bottom: 0.5rem; font-weight: bold; }
    #temperature { font-size: 2rem; margin: 1rem 0; }
    #forecast { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; margin-top: 1rem; }
    .forecast-card { background: #fff; padding: 0.5rem 1rem; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.2); width: 100px; }
    .forecast-card p { margin: 0.2rem 0; font-size: 0.9rem; }
    input, button { padding: 0.5rem; margin: 0.3rem; font-size: 1rem; border-radius: 4px; border: 1px solid #ccc; }
    button { background: #1976d2; color: white; border: none; cursor: pointer; }
    button:hover { background: #1565c0; }
  </style>
</head>
<body>

  <header>
    <h1>Dual-Unit Weather PWA</h1>
  </header>

  <main>
    <div>
      <span id="location">Detecting location…</span>
    </div>

    <div id="temperature">-- °C / -- °F</div>

    <div>
      <input type="text" id="manual-location" placeholder="Enter city or coordinates">
      <button id="search-btn">Search</button>
    </div>

    <h2>Hourly Forecast</h2>
    <div id="hourly-forecast" class="forecast"></div>

    <h2>Daily Forecast</h2>
    <div id="forecast"></div>
  </main>

  <!-- Scripts -->
  <script>
    const API_KEY = "5bf831e392c2f9ea1ad8a0cbc311745d"; // <-- replace with your free API key

    const locationEl = document.getElementById("location");
    const temperatureEl = document.getElementById("temperature");
    const forecastEl = document.getElementById("forecast");
    const hourlyEl = document.getElementById("hourly-forecast");
    const searchBtn = document.getElementById("search-btn");
    const manualInput = document.getElementById("manual-location");

    async function loadWeather(lat, lon, name) {
      locationEl.textContent = name;
      try {
        const res = await fetch(`https://api.openweathermap.org/data/2.5/onecall?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`);
        const data = await res.json();

        // Current temp in C/F
        const c = Math.round(data.current.temp);
        const f = Math.round(c * 9/5 + 32);
        temperatureEl.textContent = `${c} °C / ${f} °F`;

        // Daily forecast
        forecastEl.innerHTML = "";
        data.daily.slice(0, 7).forEach(day => {
          const minC = Math.round(day.temp.min);
          const maxC = Math.round(day.temp.max);
          const minF = Math.round(minC * 9/5 + 32);
          const maxF = Math.round(maxC * 9/5 + 32);
          const card = document.createElement("div");
          card.className = "forecast-card";
          card.innerHTML = `
            <p>${new Date(day.dt*1000).toLocaleDateString(undefined, {weekday:'short'})}</p>
            <p>${minC}°C/${minF}°F - ${maxC}°C/${maxF}°F</p>
          `;
          forecastEl.appendChild(card);
        });

        // Hourly forecast
        hourlyEl.innerHTML = "";
        data.hourly.slice(0, 12).forEach(hour => {
          const c = Math.round(hour.temp);
          const f = Math.round(c * 9/5 + 32);
          const card = document.createElement("div");
          card.className = "forecast-card";
          card.innerHTML = `
            <p>${new Date(hour.dt*1000).getHours()}:00</p>
            <p>${c}°C / ${f}°F</p>
          `;
          hourlyEl.appendChild(card);
        });

      } catch(err) {
        console.error(err);
        locationEl.textContent = "Failed to load weather";
      }
    }

    async function detectLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          pos => loadWeather(pos.coords.latitude, pos.coords.longitude, "Your location"),
          async err => {
            console.warn("Geolocation failed, using IP fallback:", err.message);
            await ipFallback();
          },
          { timeout: 5000 }
        );
      } else {
        await ipFallback();
      }
    }

    async function ipFallback() {
      try {
        const r = await fetch("https://ipapi.co/json/");
        const d = await r.json();
        if(d.latitude && d.longitude){
          loadWeather(d.latitude, d.longitude, d.city);
        } else {
          locationEl.textContent = "Could not detect location";
        }
      } catch(err) {
        console.error("IP fallback failed", err);
        locationEl.textContent = "Could not detect location";
      }
    }

    searchBtn.addEventListener("click", async () => {
      const query = manualInput.value.trim();
      if(!query) return;
      try {
        // Geocode city name to lat/lon
        const geoRes = await fetch(`https://api.openweathermap.org/geo/1.0/direct?q=${encodeURIComponent(query)}&limit=1&appid=${API_KEY}`);
        const geoData = await geoRes.json();
        if(geoData.length === 0) { locationEl.textContent = "Location not found"; return; }
        const loc = geoData[0];
        loadWeather(loc.lat, loc.lon, loc.name);
      } catch(err) {
        console.error(err);
        locationEl.textContent = "Failed to fetch location";
      }
    });

    // Register Service Worker
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('/sw.js')
        .then(()=> console.log("Service Worker registered"))
        .catch(err => console.error("Service Worker failed:", err));
    }

    // Detect location on load
    detectLocation();
  </script>
</body>
</html>
